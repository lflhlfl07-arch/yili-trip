<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苏州学区地图 🎓</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; height: 100vh; overflow: hidden; }
        .header { background: linear-gradient(135deg, #2c3e50, #3498db); color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 18px; }
        .header .sub { font-size: 11px; opacity: 0.8; }
        .nav-links { display: flex; gap: 8px; }
        .nav-links a { color: white; text-decoration: none; font-size: 12px; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 6px; }
        .nav-links a:hover { background: rgba(255,255,255,0.35); }
        .main { display: flex; height: calc(100vh - 48px); }
        .left { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        .filters { position: absolute; top: 10px; left: 10px; z-index: 800; background: white; padding: 8px 12px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .filters select, .filters input { padding: 5px 8px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 12px; outline: none; }
        .right { width: 400px; background: white; border-left: 1px solid #e8e8e8; display: flex; flex-direction: column; overflow: hidden; }
        .tabs { display: flex; border-bottom: 1px solid #eee; }
        .tab { flex: 1; padding: 9px; text-align: center; font-size: 12px; cursor: pointer; color: #999; border-bottom: 2px solid transparent; }
        .tab.active { color: #3498db; border-bottom-color: #3498db; font-weight: 600; }
        .content { flex: 1; overflow-y: auto; }

        .chain-card { margin: 10px; padding: 14px; background: #f8f9ff; border-radius: 10px; border-left: 4px solid; cursor: pointer; transition: all 0.2s; }
        .chain-card:hover { transform: translateX(3px); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .chain-card.t1 { border-color: #e74c3c; }
        .chain-card.t2 { border-color: #f39c12; }
        .chain-card.t3 { border-color: #3498db; }
        .chain-name { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 6px; }
        .chain-path { font-size: 12px; color: #666; line-height: 1.6; }
        .chain-path .arrow { color: #3498db; font-weight: 700; margin: 0 4px; }
        .chain-meta { display: flex; gap: 10px; margin-top: 8px; font-size: 11px; }
        .chain-meta span { padding: 2px 8px; border-radius: 10px; }
        .chain-district { background: #e8f4ff; color: #2980b9; }
        .chain-price { background: #fff3e0; color: #e67e22; }
        .chain-tier { background: #e8f8e8; color: #27ae60; }

        .school-item { padding: 10px 14px; border-bottom: 1px solid #f5f5f5; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .school-item:hover { background: #f8f9ff; }
        .school-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .school-icon.h { background: #fde8e8; }
        .school-icon.m { background: #fff3e0; }
        .school-icon.p { background: #e8f4ff; }
        .school-info { flex: 1; min-width: 0; }
        .school-name { font-size: 13px; font-weight: 600; color: #333; }
        .school-sub { font-size: 11px; color: #999; margin-top: 2px; }
        .school-tier-badge { font-size: 10px; padding: 2px 6px; border-radius: 8px; font-weight: 600; flex-shrink: 0; }
        .tier-1 { background: #fde8e8; color: #e74c3c; }
        .tier-2 { background: #fff3e0; color: #e67e22; }
        .tier-3 { background: #e8f4ff; color: #3498db; }

        .detail-box { padding: 16px; display: none; }
        .detail-box.show { display: block; }
        .detail-title { font-size: 18px; font-weight: 700; color: #333; }
        .detail-sub { font-size: 12px; color: #999; margin-bottom: 12px; }
        .detail-section { margin-bottom: 14px; }
        .detail-section h4 { font-size: 12px; color: #3498db; font-weight: 600; margin-bottom: 6px; border-bottom: 1px solid #f0f0f0; padding-bottom: 3px; }
        .detail-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
        .detail-row .k { color: #999; }
        .detail-row .v { color: #333; font-weight: 500; }
        .detail-note { background: #f9f9f9; padding: 8px 12px; border-radius: 6px; font-size: 12px; color: #666; line-height: 1.5; }

        .placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #ccc; font-size: 13px; text-align: center; padding: 30px; }

        .legend { position: absolute; bottom: 14px; left: 10px; background: rgba(255,255,255,0.95); padding: 8px 12px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); font-size: 11px; z-index: 800; }
        .legend .li { display: flex; align-items: center; gap: 5px; margin: 2px 0; }
        .legend .ld { width: 10px; height: 10px; border-radius: 50%; }

        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .left { height: 45vh; }
            .right { width: 100%; height: 55vh; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>🎓 苏州学区地图</h1>
        <div class="sub">小学 · 初中 · 高中 · 升学链路</div>
    </div>
    <div class="nav-links">
        <a href="/hub/housing/">🏡 房产地图</a>
    </div>
</div>

<div class="main">
    <div class="left">
        <div class="filters">
            <select id="fDistrict" onchange="render()">
                <option value="all">全部区域</option>
                <option value="园区">工业园区</option>
                <option value="新区">高新区</option>
                <option value="姑苏">姑苏区</option>
                <option value="吴中">吴中区</option>
                <option value="相城">相城区</option>
                <option value="吴江">吴江区</option>
            </select>
            <select id="fType" onchange="render()">
                <option value="all">全部学校</option>
                <option value="小学">小学</option>
                <option value="初中">初中</option>
                <option value="高中">高中</option>
            </select>
            <select id="fTier" onchange="render()">
                <option value="all">全部梯队</option>
                <option value="1">⭐ 第一梯队</option>
                <option value="2">🌟 第二梯队</option>
                <option value="3">✨ 第三梯队</option>
            </select>
            <input type="text" id="fSearch" placeholder="🔍 搜学校" oninput="render()" style="width:110px;" />
        </div>
        <div id="map"></div>
        <div class="legend">
            <h4 style="font-size:11px;margin-bottom:3px;">学校类型</h4>
            <div class="li"><span class="ld" style="background:#e74c3c"></span> 高中</div>
            <div class="li"><span class="ld" style="background:#f39c12"></span> 初中</div>
            <div class="li"><span class="ld" style="background:#3498db"></span> 小学</div>
        </div>
    </div>

    <div class="right">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('chains')">🔗 升学链</div>
            <div class="tab" onclick="switchTab('list')">📋 学校列表</div>
            <div class="tab" onclick="switchTab('detail')">📄 详情</div>
        </div>
        <div class="content" id="content">
            <div id="chainsView"></div>
            <div id="listView" style="display:none;"></div>
            <div class="detail-box" id="detailView">
                <div class="detail-title" id="dtName"></div>
                <div class="detail-sub" id="dtSub"></div>
                <div class="detail-section">
                    <h4>📋 基本信息</h4>
                    <div class="detail-row"><span class="k">类型</span><span class="v" id="dtType"></span></div>
                    <div class="detail-row"><span class="k">区域</span><span class="v" id="dtDist"></span></div>
                    <div class="detail-row"><span class="k">梯队</span><span class="v" id="dtTier"></span></div>
                    <div class="detail-row" id="dtScoreRow" style="display:none;"><span class="k">录取分</span><span class="v" id="dtScore"></span></div>
                    <div class="detail-row" id="dtPairRow" style="display:none;"><span class="k">对口升学</span><span class="v" id="dtPair"></span></div>
                </div>
                <div class="detail-section">
                    <h4>💬 说明</h4>
                    <div class="detail-note" id="dtNote"></div>
                </div>
            </div>
            <div class="placeholder" id="placeholder" style="display:none;">点击地图或列表<br>查看学校详情</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="school-data.js"></script>
<script>
const GEOJSON_URL = 'https://geo.datav.aliyun.com/areas_v3/bound/320500_full.json';
const DISTRICT_MAP = { '虎丘区':'新区','吴中区':'吴中','相城区':'相城','姑苏区':'姑苏','吴江区':'吴江','工业园区':'园区','常熟市':null,'张家港市':null,'昆山市':null,'太仓市':null };
const DCOLORS = { '园区':'#667eea','新区':'#42b983','姑苏':'#f39c12','吴中':'#e74c3c','相城':'#9b59b6','吴江':'#1abc9c' };
const TYPE_COLORS = { '高中':'#e74c3c', '初中':'#f39c12', '小学':'#3498db' };
const TYPE_EMOJI = { '高中':'🏫', '初中':'📚', '小学':'🎒' };
const TIER_LABELS = { 1:'第一梯队 ⭐', 2:'第二梯队 🌟', 3:'第三梯队 ✨' };

let currentTab = 'chains';
let currentSchool = null;
let markers = [];

const map = L.map('map', { center:[31.30,120.63], zoom:12, minZoom:10, maxZoom:18, maxBounds:[[30.8,120.0],[31.8,121.3]] });
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', { subdomains:'1234', maxZoom:18 }).addTo(map);

// 蒙层 + 区域边界
fetch(GEOJSON_URL).then(r=>r.json()).then(geo => {
    const suzhouCoords = [];
    geo.features.forEach(f => {
        const m = DISTRICT_MAP[f.properties.name];
        if (m === null) return;
        const g = f.geometry;
        if (g.type === 'Polygon') suzhouCoords.push(g.coordinates[0]);
        else if (g.type === 'MultiPolygon') g.coordinates.forEach(p => suzhouCoords.push(p[0]));
    });
    const outer = [[180,-90],[180,90],[-180,90],[-180,-90],[180,-90]];
    const maskCoords = [outer];
    suzhouCoords.forEach(ring => maskCoords.push(ring.map(c=>[c[1],c[0]])));
    L.polygon(maskCoords, { color:'none', fillColor:'#f0f2f5', fillOpacity:0.85, interactive:false }).addTo(map);

    geo.features.forEach(f => {
        const m = DISTRICT_MAP[f.properties.name];
        if (m === null) return;
        const c = DCOLORS[m] || '#999';
        L.geoJSON(f, { style: { color:c, weight:2, fillColor:c, fillOpacity:0.05 } }).addTo(map);
        const center = f.properties.centroid || f.properties.center;
        if (center) {
            L.marker([center[1],center[0]], {
                icon: L.divIcon({
                    className:'',
                    html:`<div style="font-size:13px;font-weight:800;color:${c};text-shadow:1px 1px 3px white,-1px -1px 3px white,1px -1px 3px white,-1px 1px 3px white,0 0 6px white;white-space:nowrap;">${m==='新区'?'高新区':m+(m==='园区'?'':'区')}</div>`,
                    iconSize:[80,20], iconAnchor:[40,10]
                }), interactive:false
            }).addTo(map);
        }
    });
});

function getAllSchools() {
    return [
        ...SCHOOL_DB.highSchools,
        ...SCHOOL_DB.middleSchools,
        ...SCHOOL_DB.primarySchools
    ];
}

function getFiltered() {
    const d = document.getElementById('fDistrict').value;
    const t = document.getElementById('fType').value;
    const ti = document.getElementById('fTier').value;
    const s = document.getElementById('fSearch').value.trim().toLowerCase();
    return getAllSchools().filter(sc => {
        if (d !== 'all' && sc.district !== d) return false;
        if (t !== 'all' && sc.type !== t) return false;
        if (ti !== 'all' && sc.tier !== parseInt(ti)) return false;
        if (s && !sc.name.toLowerCase().includes(s)) return false;
        return true;
    });
}

function render() {
    const data = getFiltered();
    renderMarkers(data);
    if (currentTab === 'list') renderList(data);
    if (currentTab === 'chains') renderChains();
}

function renderMarkers(data) {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    data.forEach(sc => {
        const color = TYPE_COLORS[sc.type];
        const emoji = TYPE_EMOJI[sc.type];
        const icon = L.divIcon({
            className: '',
            html: `<div style="background:${color};color:white;padding:2px 6px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.3);border:1.5px solid white;cursor:pointer;">${emoji} ${sc.name.length>6?sc.name.slice(0,6)+'…':sc.name}</div>`,
            iconSize: [100, 20], iconAnchor: [50, 10]
        });
        const m = L.marker([sc.lat, sc.lng], { icon }).addTo(map);
        m.on('click', () => showSchoolDetail(sc));
        markers.push(m);
    });
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['chains','list','detail'][i]===tab));
    document.getElementById('chainsView').style.display = tab==='chains'?'block':'none';
    document.getElementById('listView').style.display = tab==='list'?'block':'none';
    document.getElementById('detailView').style.display = tab==='detail'&&currentSchool?'block':'none';
    document.getElementById('placeholder').style.display = tab==='detail'&&!currentSchool?'flex':'none';
    if (tab==='list') renderList(getFiltered());
    if (tab==='chains') renderChains();
}

function renderChains() {
    const d = document.getElementById('fDistrict').value;
    const chains = SCHOOL_DB.chains.filter(c => d==='all' || c.district===d);
    document.getElementById('chainsView').innerHTML = chains.map(c => `
        <div class="chain-card t${c.tier}" onclick="showChainSchools('${c.name}')">
            <div class="chain-name">${c.name}</div>
            <div class="chain-path">
                🎒 ${c.primary} <span class="arrow">→</span>
                📚 ${c.middle} <span class="arrow">→</span>
                🏫 ${c.high}
            </div>
            <div class="chain-meta">
                <span class="chain-district">${c.district}</span>
                <span class="chain-price">💰 ${c.priceRange}</span>
                <span class="chain-tier">${TIER_LABELS[c.tier]}</span>
            </div>
            <div style="font-size:11px;color:#999;margin-top:6px;">${c.note}</div>
        </div>
    `).join('');
}

function showChainSchools(chainName) {
    const chain = SCHOOL_DB.chains.find(c => c.name === chainName);
    if (!chain) return;
    // 高亮链上的学校
    const names = [chain.primary, chain.middle, chain.high];
    const schools = getAllSchools().filter(s => names.some(n => s.name.includes(n) || n.includes(s.name)));
    if (schools.length > 0) {
        const bounds = L.latLngBounds(schools.map(s => [s.lat, s.lng]));
        map.fitBounds(bounds.pad(0.3));
    }
}

function renderList(data) {
    const sorted = [...data].sort((a,b) => a.tier - b.tier);
    document.getElementById('listView').innerHTML = sorted.map(sc => `
        <div class="school-item" onclick='showSchoolDetail(${JSON.stringify(sc).replace(/'/g,"&#39;")})'>
            <div class="school-icon ${sc.type==='高中'?'h':sc.type==='初中'?'m':'p'}">${TYPE_EMOJI[sc.type]}</div>
            <div class="school-info">
                <div class="school-name">${sc.name}</div>
                <div class="school-sub">${sc.district} · ${sc.note}</div>
            </div>
            <span class="school-tier-badge tier-${sc.tier}">${TIER_LABELS[sc.tier]}</span>
        </div>
    `).join('');
}

function showSchoolDetail(sc) {
    currentSchool = sc;
    document.getElementById('dtName').textContent = sc.name;
    document.getElementById('dtSub').textContent = sc.district + ' · ' + sc.type;
    document.getElementById('dtType').textContent = TYPE_EMOJI[sc.type] + ' ' + sc.type;
    document.getElementById('dtDist').textContent = sc.district;
    document.getElementById('dtTier').innerHTML = `<span class="school-tier-badge tier-${sc.tier}">${TIER_LABELS[sc.tier]}</span>`;
    document.getElementById('dtNote').textContent = sc.note || '';

    const scoreRow = document.getElementById('dtScoreRow');
    if (sc.score) { scoreRow.style.display = 'flex'; document.getElementById('dtScore').textContent = sc.score; }
    else scoreRow.style.display = 'none';

    const pairRow = document.getElementById('dtPairRow');
    const pairVal = sc.pairWith || sc.pairMiddle || '';
    if (pairVal) { pairRow.style.display = 'flex'; document.getElementById('dtPair').textContent = pairVal; }
    else pairRow.style.display = 'none';

    switchTab('detail');
    map.setView([sc.lat, sc.lng], 15, { animate: true });
}

render();
</script>
</body>
</html>
